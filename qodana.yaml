# Qodana Configuration for Dora AI
# Comprehensive code quality analysis and monitoring

version: "1.0"

# Project profile for Flutter/Dart analysis
profile:
  name: qodana.recommended

# Include all necessary paths for analysis
include:
  - lib/
  - android/
  - test/

# Exclude generated and third-party code
exclude:
  - build/
  - .dart_tool/
  - .flutter-plugins
  - .flutter-plugins-dependencies
  - .packages
  - pubspec.lock
  - ios/
  - linux/
  - macos/
  - web/
  - windows/

# Linter configuration
linter:
  # Enable all relevant inspections for Flutter
  inspections:
    # Dart specific
    - DartUnusedImport
    - DartUnnecessaryNew
    - DartPreferContains
    - DartPreferFinalFields
    - DartPreferInterpolationToComposeStrings
    - DartPreferConstConstructors

    # Flutter specific
    - FlutterStatefulWidgetHasStateClass
    - FlutterMissingRequiredField
    - FlutterInvalidUseOfWidget

    # General code quality
    - UnusedDeclaration
    - RedundantCast
    - NullableProblems
    - ConstantConditions
    - InconsistentNaming

    # Security
    - HardcodedCredentials
    - WeakCryptography
    - PathTraversalIn

    # Performance
    - LoopStatementsThatDontLoop
    - StringConcatenationInLoop
    - CollectionAddAllCanBeReplacedWithConstructor

# Fail threshold configuration
failThreshold: 50

# Docker configuration for consistent analysis environment
bootstrap: |
  echo "Setting up Dora AI analysis environment..."
  flutter --version
  flutter pub get
  flutter analyze --no-fatal-infos

# IDE configuration
ide: FL  # Flutter/Dart IDE profile

# Script to run before analysis
script:
  name: flutter-analysis
  parameters:
    version: stable

# Custom analysis script
customScript: |
  #!/bin/bash
  echo "Running Dora AI specific analysis..."
  
  # Run Flutter analysis
  flutter analyze --write=analysis_results.txt
  
  # Run tests if they exist
  if [ -d "test" ]; then
    flutter test
  fi
  
  # Check for security issues in dependencies
  flutter pub deps
  
  echo "Analysis complete for Dora AI project"
